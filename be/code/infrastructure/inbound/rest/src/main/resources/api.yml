openapi: 3.0.1
info:
  title: 'Inventory OpenAPI spec'
  version: 0.0.6
servers:
  - url: http://localhost:8080
    description: local
paths:
  /caps:
    get:
      tags:
        - cap-controller
      operationId: findCaps
      parameters:
        - name: country
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cap'
    post:
      tags:
        - cap-controller
      operationId: createCap
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCap'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cap'
        '400':
          description: Validation failed or unknown country
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /caps/{id}:
    get:
      tags:
        - cap-controller
      operationId: findCapById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Cap'
        '404':
          description: Cap not found
    put:
      tags:
        - cap-controller
      operationId: updateCap
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCap'
        required: true
      responses:
        '204':
          description: No-content
        '400':
          description: Validation failed or unknown country
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Cap not found
    delete:
      tags:
        - cap-controller
      operationId: deleteCapById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '404':
          description: Cap not found
  /countries:
    get:
      tags:
        - country-controller
      operationId: findCountries
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Country'
  /countries/{code}:
    get:
      tags:
        - country-controller
      operationId: findCountryByCode
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Country'
        '404':
          description: Country not found
  /books:
    get:
      tags:
        - book-controller
      operationId: findBooks
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
    post:
      tags:
        - book-controller
      operationId: createBook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBook'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '400':
          description: Validation failed
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /books/{id}:
    get:
      tags:
        - book-controller
      operationId: findBookById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Book not found
    put:
      tags:
        - book-controller
      operationId: updateBook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBook'
        required: true
      responses:
        '204':
          description: No-content
        '400':
          description: Validation failed
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Book not found
    delete:
      tags:
        - book-controller
      operationId: deleteBookById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '404':
          description: Book not found
components:
  schemas:
    CreateBook:
      type: object
      required:
        - title
        - author
        - description
      properties:
        title:
          type: string
          maxLength: 255
        author:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 5000
    UpdateBook:
      type: object
      required:
        - title
        - author
        - description
      properties:
        title:
          type: string
          maxLength: 255
        author:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 5000
    CreateCap:
      type: object
      required:
        - name
        - description
        - amount
        - country
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 5000
        amount:
          type: integer
          format: int32
          minimum: 1
        country:
          type: string
          maxLength: 10
    UpdateCap:
      type: object
      required:
        - name
        - description
        - amount
        - country
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 5000
        amount:
          type: integer
          format: int32
          minimum: 1
        country:
          type: string
          maxLength: 10
    Cap:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        amount:
          type: integer
          format: int32
        country:
          $ref: '#/components/schemas/Country'
    Country:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
    Book:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        author:
          type: string
        description:
          type: string
    Problem:
      type: object
      properties:
        title:
          type: string
          example: "Bad Request"
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: "Validation failed"
        instance:
          type: string
          example: "/books"
        errors:
          type: object
          additionalProperties:
            type: string
          example:
            name: "must not be blank"
            title: "size must be between 0 and 255"
